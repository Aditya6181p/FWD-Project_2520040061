<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Page</title>
        <link rel="stylesheet" href="login.css" />
    </head>
    <body>
        <div class="login-container">
            <div class="login-header">
                <img src="Sports.png" alt="Logo" style="height: 60px" />
                <h1>Titan Manager</h1>
                <h2>Hello!</h2>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="Enter your email"
                        autocomplete="email"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    />
                </div>

                <button type="submit" class="login-button">Sign In</button>
            </form>

            <div class="divider"><span>or</span></div>
            <button type="button" class="signup-button">
                <a href="Signup.html"> Create New Account</a>
            </button>
            <div class="forgot-password"><a href="#">Forgot Password?</a></div>
        </div>

        <script>
            document
                .getElementById("loginForm")
                .addEventListener("submit", async function (e) {
                    e.preventDefault();

                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;

                    try {
                        // Send data to the Node.js server
                        const response = await fetch(
                            "http://localhost:3000/login",
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                },
                                body: JSON.stringify({ email, password }),
                            },
                        );

                        const data = await response.json();

                        if (response.ok) {
                            alert(
                                "Login Successful! Welcome " +
                                    data.user.firstName,
                            );
                            window.location.href = "AiPage.html";
                        } else {
                            // This shows the "Invalid Credentials" message from the server
                            alert("Error: " + data.message);
                        }
                    } catch (error) {
                        console.error("Error:", error);
                        alert(
                            "Could not connect to the server. Make sure Node.js is running!",
                        );
                    }
                });
        </script>
    </body>
</html>
